name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build treemon.slnx

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test
        run: dotnet test src/Tests/Tests.fsproj --filter "Category!=Local" --no-build --verbosity normal
