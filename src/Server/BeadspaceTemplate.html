<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beadspace</title>
<style>
:root {
    --bg-deep: #1e1e2e;
    --bg-surface: #181825;
    --bg-elevated: #313244;
    --bg-hover: #45475a;
    --border: #45475a;
    --border-bright: #585b70;
    --text-primary: #cdd6f4;
    --text-secondary: #bac2de;
    --text-muted: #6c7086;
    --accent: #cba6f7;
    --accent-bright: #b4befe;
    --accent-dim: rgba(203, 166, 247, 0.15);
    --status-open: #71717a;
    --status-wip: #f59e0b;
    --status-blocked: #ef4444;
    --status-closed: #22c55e;
    --p1: #ef4444;
    --p2: #f97316;
    --p3: #3b82f6;
    --type-bug: #ef4444;
    --type-feature: #8b5cf6;
    --type-task: #3b82f6;
    --type-chore: #71717a;
    --type-epic: #f59e0b;
    --severity-alert: #ef4444;
    --severity-warning: #f59e0b;
    --severity-info: #cba6f7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    margin: 0;
    padding: 0;
    /* Full-bleed dashboard: opt out of the injected :where(body) page-width cap. */
    max-width: none;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
}

/* View */
.view { display: block; padding: 1.5rem 2rem 3rem; }

/* Issue badges (shared by issues table) */
.issue-priority {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 0.125rem;
}

.issue-priority.p1 { background: rgba(239, 68, 68, 0.15); color: var(--p1); }
.issue-priority.p2 { background: rgba(249, 115, 22, 0.15); color: var(--p2); }
.issue-priority.p3 { background: rgba(59, 130, 246, 0.15); color: var(--p3); }

.issue-type {
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.0625rem 0.375rem;
    border-radius: 3px;
}

.issue-type.type-bug { background: rgba(239, 68, 68, 0.12); color: var(--type-bug); }
.issue-type.type-feature { background: rgba(139, 92, 246, 0.12); color: var(--type-feature); }
.issue-type.type-task { background: rgba(59, 130, 246, 0.1); color: var(--type-task); }
.issue-type.type-chore { background: rgba(113, 113, 122, 0.12); color: var(--type-chore); }
.issue-type.type-epic { background: rgba(245, 158, 11, 0.12); color: var(--type-epic); }

.tag {
    font-size: 0.6875rem;
    color: var(--text-muted);
    background: var(--bg-elevated);
    padding: 0.0625rem 0.375rem;
    border-radius: 3px;
}

/* Issues Table View */
.search-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
}

.search-input {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.625rem 1rem;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.filter-chip {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}

.filter-chip:hover { border-color: var(--border-bright); color: var(--text-primary); }
.filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-bright); }

.filter-count {
    display: inline-block;
    margin-left: 0.375rem;
    padding: 0.0625rem 0.375rem;
    border-radius: 999px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 0.6875rem;
    font-weight: 600;
    line-height: 1.4;
}
.filter-count:empty { display: none; }
.filter-chip.active .filter-count { background: var(--accent); color: var(--bg-deep); }

.issues-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
}

.issues-table th {
    text-align: left;
    padding: 0.625rem 0.75rem;
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elevated);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
}

.issues-table th:hover { color: var(--text-secondary); }

.issues-table td {
    padding: 0.5rem 0.75rem;
    font-size: 0.8125rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
}

.issues-table tr:last-child td { border-bottom: none; }
.issues-table tr.issue-table-row { cursor: pointer; }
.issues-table tr.issue-table-row:hover td { background: var(--bg-hover); }

.issues-table .col-id {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.6875rem;
    color: var(--text-muted);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.25rem;
}

.copy-id-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.25rem;
    height: 1.25rem;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
    opacity: 0;
    flex-shrink: 0;
    transition: opacity 0.12s ease, color 0.12s ease, background 0.12s ease;
}
.issues-table tr.issue-table-row:hover .copy-id-btn { opacity: 1; }
.copy-id-btn:hover { color: var(--text-primary); background: var(--bg-elevated); }
.copy-id-btn:focus-visible { opacity: 1; outline: 1px solid var(--accent); outline-offset: 1px; }
.copy-id-btn svg { width: 0.875rem; height: 0.875rem; display: block; }
.copy-id-btn .check-icon { display: none; }
.copy-id-btn.copied { color: var(--status-closed); opacity: 1; }
.copy-id-btn.copied .copy-icon { display: none; }
.copy-id-btn.copied .check-icon { display: block; }

.issues-table .col-title {
    font-weight: 500;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.issues-table .col-status {
    white-space: nowrap;
}

.status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 0.375rem;
}

.status-dot.open { background: var(--status-open); }
.status-dot.in_progress { background: var(--status-wip); }
.status-dot.blocked { background: var(--status-blocked); }
.status-dot.closed { background: var(--status-closed); }

/* Detail Panel */
.detail-panel {
    display: none;
}

.detail-panel td {
    padding: 0 !important;
    background: var(--bg-deep) !important;
}

.detail-panel.expanded {
    display: table-row;
}

.detail-content {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
}

.detail-description {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 0.75rem;
    max-height: 200px;
    overflow-y: auto;
}

.detail-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
}

.detail-badge {
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.125rem 0.5rem;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
}

.detail-badge.priority { background: rgba(203, 166, 247, 0.15); color: var(--accent); }
.detail-badge.type { background: rgba(180, 190, 254, 0.15); color: var(--accent-bright); }
.detail-badge.deps { background: var(--bg-elevated); color: var(--text-secondary); }

.detail-labels {
    display: flex;
    flex-wrap: wrap;
    gap: 0.375rem;
    margin-bottom: 0.75rem;
}

.detail-label-pill {
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.125rem 0.5rem;
    border-radius: 10px;
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border);
}

.detail-meta {
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-family: 'Consolas', 'Courier New', monospace;
}

/* Loading state */
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 1rem;
}

.loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
    color: var(--text-muted);
    font-size: 0.8125rem;
}

.error-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 1rem;
    color: var(--severity-alert);
}

.error-state code {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--bg-surface);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* Footer */
.footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
}
.footer a {
    color: var(--text-secondary);
    text-decoration: none;
}
.footer a:hover { color: var(--accent-bright); }

/* Transitions */
.view { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Mobile Responsive ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
    .view { padding: 1rem 0.75rem 2rem; }

    .search-bar {
        flex-wrap: wrap;
        gap: 0.375rem;
    }
    .search-input {
        width: 100%;
        flex: 1 0 100%;
        font-size: 1rem;
    }
    .filter-chip {
        flex: 1;
        text-align: center;
        min-width: 0;
        padding: 0.5rem 0.5rem;
    }

    .issues-table thead { display: none; }

    .issues-table,
    .issues-table tbody,
    .issues-table tr,
    .issues-table td { display: block; }

    .issues-table {
        border: none;
        background: none;
    }

    .issues-table tr {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 0.5rem;
        padding: 0.75rem 1rem;
    }

    .issues-table td {
        border-bottom: none;
        padding: 0.125rem 0;
    }

    .issues-table tr:hover td { background: none; }

    .issues-table .col-id {
        font-size: 0.625rem;
        margin-bottom: 0.125rem;
    }

    .copy-id-btn { opacity: 1; }

    .issues-table .col-title {
        white-space: normal;
        max-width: none;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
    }

    .footer { padding: 1rem 0.75rem; }
}
</style>
</head>
<body>

<div id="app">
    <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading issues...</div>
    </div>
</div>

<script>
// ─── Data Loading ────────────────────────────────────────────────────────────
// Fetches beads data from same-origin endpoint and renders the issues table.
// All user-facing text is rendered via textContent (safe) or the esc() helper.

function esc(str) {
    var el = document.createElement('span');
    el.textContent = str || '';
    return el.innerHTML;
}

function copyTextToClipboard(text) {
    var safe = String(text).replace(/[\u0000-\u001F\u007F]/g, '');
    return navigator.clipboard.writeText(safe);
}

var COPY_ICON_SVG = '<svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
var CHECK_ICON_SVG = '<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function createCopyIdButton(id) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'copy-id-btn';
    btn.title = 'Copy ID';
    btn.setAttribute('aria-label', 'Copy issue ID');
    btn.innerHTML = COPY_ICON_SVG + CHECK_ICON_SVG;
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyTextToClipboard(id).then(function() {
            btn.classList.add('copied');
            btn.title = 'Copied!';
            setTimeout(function() { btn.classList.remove('copied'); btn.title = 'Copy ID'; }, 1200);
        });
    });
    return btn;
}

function daysAgo(dateStr) {
    if (!dateStr) return 0;
    var diff = Date.now() - new Date(dateStr).getTime();
    return Math.max(0, Math.floor(diff / 86400000));
}

function defaultPriority(p) { return p != null ? p : 2; }

function pLabel(p) { return 'P' + defaultPriority(p); }

function statusLabel(status) {
    if (status === 'in_progress') return 'In Progress';
    return status.charAt(0).toUpperCase() + status.slice(1);
}

function ageLabel(dateStr) {
    var age = daysAgo(dateStr);
    return age > 0 ? age + 'd' : 'today';
}

function statusCounts(issues) {
    return issues.reduce(function(acc, i) {
        acc[i.status] = (acc[i.status] || 0) + 1;
        return acc;
    }, {});
}

// Default to the most actionable non-empty status: WIP > open > blocked > closed.
function chooseDefaultFilter(issues) {
    var counts = statusCounts(issues);
    return ['in_progress', 'open', 'blocked', 'closed'].find(function(s) {
        return (counts[s] || 0) > 0;
    }) || 'open';
}

// ─── Data URL from pathname ──────────────────────────────────────────────────
var dataUrl = (function() {
    var path = window.location.pathname;
    var lastSlash = path.lastIndexOf('/');
    var base = lastSlash >= 0 ? path.substring(0, lastSlash + 1) : '/';
    return base + 'beads-data';
})();

// ─── Issues Table (DOM-based rendering) ──────────────────────────────────────
var tableState = {
    issues: [],
    sort: { field: 'priority', dir: 1 },
    filter: 'open',
    query: '',
    expandedId: null
};

function renderIssuesView() {
    var filters = [
        { value: 'all', label: 'All' },
        { value: 'open', label: 'Open' },
        { value: 'in_progress', label: 'WIP' },
        { value: 'blocked', label: 'Blocked' },
        { value: 'closed', label: 'Closed' }
    ];
    var chipsHtml = filters.map(function(f) {
        var cls = f.value === tableState.filter ? 'filter-chip active' : 'filter-chip';
        return '<button class="' + cls + '" data-filter="' + f.value + '">' + f.label +
            '<span class="filter-count" data-count="' + f.value + '"></span></button>';
    }).join('');
    return '<div id="view-issues" class="view">' +
        '<div class="search-bar">' +
        '<input type="text" class="search-input" id="search" placeholder="Search issues..." autocomplete="off"' +
        (tableState.query ? ' value="' + esc(tableState.query) + '"' : '') + '>' +
        chipsHtml +
        '</div>' +
        '<table class="issues-table"><thead><tr>' +
        '<th data-sort="id">ID</th>' +
        '<th data-sort="priority">Priority</th>' +
        '<th data-sort="title">Title</th>' +
        '<th data-sort="status">Status</th>' +
        '<th data-sort="type">Type</th>' +
        '<th data-sort="labels">Labels</th>' +
        '<th data-sort="age">Age</th>' +
        '</tr></thead><tbody id="issues-tbody"></tbody></table></div>';
}

function createDetailRow(issue, colSpan) {
    var tr = document.createElement('tr');
    tr.className = 'detail-panel expanded';
    tr.dataset.detailFor = issue.id;

    var td = document.createElement('td');
    td.colSpan = colSpan;

    var content = document.createElement('div');
    content.className = 'detail-content';

    // Badges row
    var badges = document.createElement('div');
    badges.className = 'detail-badges';

    function addBadge(container, className, text) {
        var el = document.createElement('span');
        el.className = 'detail-badge ' + className;
        el.textContent = text;
        container.appendChild(el);
    }

    addBadge(badges, 'priority', pLabel(issue.priority));
    addBadge(badges, 'type', issue.issue_type || 'task');
    if (issue.dependency_count > 0) addBadge(badges, 'deps', issue.dependency_count + ' dependencies');
    if (issue.dependent_count > 0) addBadge(badges, 'deps', issue.dependent_count + ' dependents');
    addBadge(badges, 'deps', 'Created ' + ageLabel(issue.created_at) + ' ago');
    if (issue.updated_at) addBadge(badges, 'deps', 'Updated ' + ageLabel(issue.updated_at) + ' ago');

    content.appendChild(badges);

    // Labels
    var issueLabels = issue.labels || [];
    if (issueLabels.length > 0) {
        var labelsDiv = document.createElement('div');
        labelsDiv.className = 'detail-labels';
        issueLabels.forEach(function(l) {
            var pill = document.createElement('span');
            pill.className = 'detail-label-pill';
            pill.textContent = l;
            labelsDiv.appendChild(pill);
        });
        content.appendChild(labelsDiv);
    }

    // Description
    if (issue.description) {
        var desc = document.createElement('div');
        desc.className = 'detail-description';
        desc.textContent = issue.description;
        content.appendChild(desc);
    } else {
        var noDesc = document.createElement('div');
        noDesc.className = 'detail-description';
        noDesc.style.fontStyle = 'italic';
        noDesc.textContent = 'No description';
        content.appendChild(noDesc);
    }

    td.appendChild(content);
    tr.appendChild(td);
    return tr;
}

function renderIssuesTable() {
    var filtered = tableState.issues.filter(function(i) {
        if (tableState.filter !== 'all' && i.status !== tableState.filter) return false;
        if (tableState.query) {
            var q = tableState.query.toLowerCase();
            return (i.title || '').toLowerCase().indexOf(q) !== -1 ||
                   String(i.id).toLowerCase().indexOf(q) !== -1 ||
                   (i.labels || []).some(function(l) { return l.toLowerCase().indexOf(q) !== -1; });
        }
        return true;
    });

    filtered.sort(function(a, b) {
        var va, vb;
        switch (tableState.sort.field) {
            case 'priority': va = defaultPriority(a.priority); vb = defaultPriority(b.priority); break;
            case 'age': va = daysAgo(a.created_at); vb = daysAgo(b.created_at); break;
            case 'status': va = a.status; vb = b.status; break;
            case 'type': va = a.issue_type || ''; vb = b.issue_type || ''; break;
            case 'title': va = a.title || ''; vb = b.title || ''; break;
            case 'id': va = String(a.id); vb = String(b.id); break;
            default: va = defaultPriority(a.priority); vb = defaultPriority(b.priority);
        }
        if (typeof va === 'string') return va.localeCompare(vb) * tableState.sort.dir;
        return (va - vb) * tableState.sort.dir;
    });

    var tbody = document.getElementById('issues-tbody');
    if (!tbody) return;
    while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

    var colSpan = 7;

    filtered.forEach(function(i) {
        var ageStr = ageLabel(i.created_at);
        var p = defaultPriority(i.priority);
        var sl = statusLabel(i.status);
        var tr = document.createElement('tr');
        tr.className = 'issue-table-row';
        tr.dataset.issueId = i.id;

        var tdId = document.createElement('td');
        tdId.className = 'col-id';
        var idText = document.createElement('span');
        idText.className = 'id-text';
        idText.textContent = i.id;
        tdId.appendChild(idText);
        tdId.appendChild(createCopyIdButton(i.id));
        tr.appendChild(tdId);

        var tdPri = document.createElement('td');
        var priSpan = document.createElement('span');
        priSpan.className = 'issue-priority p' + p;
        priSpan.textContent = 'P' + p;
        tdPri.appendChild(priSpan);
        tr.appendChild(tdPri);

        var tdTitle = document.createElement('td');
        tdTitle.className = 'col-title';
        tdTitle.textContent = i.title;
        tr.appendChild(tdTitle);

        var tdStatus = document.createElement('td');
        tdStatus.className = 'col-status';
        var statusDot = document.createElement('span');
        statusDot.className = 'status-dot ' + i.status;
        tdStatus.appendChild(statusDot);
        tdStatus.appendChild(document.createTextNode(sl));
        tr.appendChild(tdStatus);

        var tdType = document.createElement('td');
        var typeSpan = document.createElement('span');
        typeSpan.className = 'issue-type type-' + (i.issue_type || 'task');
        typeSpan.textContent = i.issue_type || 'task';
        tdType.appendChild(typeSpan);
        tr.appendChild(tdType);

        var tdLabels = document.createElement('td');
        (i.labels || []).forEach(function(l) {
            var tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = l;
            tdLabels.appendChild(tagSpan);
            tdLabels.appendChild(document.createTextNode(' '));
        });
        tr.appendChild(tdLabels);

        var tdAge = document.createElement('td');
        tdAge.style.fontFamily = "'Consolas', 'Courier New', monospace";
        tdAge.style.fontSize = '0.6875rem';
        tdAge.style.color = 'var(--text-muted)';
        tdAge.textContent = ageStr;
        tr.appendChild(tdAge);

        // Click handler for detail panel
        tr.addEventListener('click', function() {
            var existingDetail = tbody.querySelector('[data-detail-for="' + CSS.escape(i.id) + '"]');
            if (existingDetail) {
                existingDetail.remove();
                tableState.expandedId = null;
            } else {
                // Collapse any other expanded detail
                var prev = tbody.querySelector('.detail-panel');
                if (prev) prev.remove();
                var detailRow = createDetailRow(i, colSpan);
                tr.parentNode.insertBefore(detailRow, tr.nextSibling);
                tableState.expandedId = i.id;
            }
        });

        tbody.appendChild(tr);

        // Re-expand if this was the previously expanded issue
        if (tableState.expandedId === i.id) {
            var detailRow = createDetailRow(i, colSpan);
            tbody.appendChild(detailRow);
        }
    });
}

function updateFilterCounts() {
    var counts = statusCounts(tableState.issues);
    document.querySelectorAll('.filter-count').forEach(function(el) {
        var n = counts[el.dataset.count] || 0;
        el.textContent = n > 0 ? String(n) : '';
    });
}

function bindIssuesEvents() {
    document.querySelectorAll('.issues-table th[data-sort]').forEach(function(th) {
        th.addEventListener('click', function() {
            var field = th.dataset.sort;
            if (tableState.sort.field === field) { tableState.sort.dir *= -1; }
            else { tableState.sort = { field: field, dir: 1 }; }
            renderIssuesTable();
        });
    });

    document.querySelectorAll('.filter-chip').forEach(function(chip) {
        chip.addEventListener('click', function() {
            document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
            chip.classList.add('active');
            tableState.filter = chip.dataset.filter;
            renderIssuesTable();
        });
    });

    var searchEl = document.getElementById('search');
    if (searchEl) {
        searchEl.addEventListener('input', function(e) {
            tableState.query = e.target.value;
            renderIssuesTable();
        });
    }
}

// ─── Page title from URL path ────────────────────────────────────────────────
var pageName = (function() {
    var seg = window.location.pathname.split('/').filter(Boolean)[0];
    return seg ? decodeURIComponent(seg) : 'Beadspace';
})();
document.title = pageName;

// ─── Data fetching and rendering ─────────────────────────────────────────────
var currentIssues = [];
var initialized = false;
var lastDataJson = null;

// ─── Initial render: full DOM build + event binding (called once) ────────────
function initialRender(issues) {
    currentIssues = issues;
    tableState.issues = issues;
    tableState.filter = chooseDefaultFilter(issues);

    var app = document.getElementById('app');
    app.textContent = '';
    app.insertAdjacentHTML('beforeend', renderIssuesView());

    // Bind issues table events and render
    bindIssuesEvents();
    renderIssuesTable();
    updateFilterCounts();
    initialized = true;
}

// ─── Incremental refresh: update data without destroying UI state ────────────
function refreshData() {
    fetch(dataUrl)
        .then(function(r) {
            if (!r.ok) throw new Error('Failed to load beads data (HTTP ' + r.status + ')');
            return r.text();
        })
        .then(function(text) {
            // Skip re-render when the payload is unchanged: avoids needless DOM rebuilds
            // (and any UI-state churn) on the periodic poll. State only refreshes on real changes.
            if (initialized && text === lastDataJson) return;
            lastDataJson = text;
            var issues = JSON.parse(text);
            if (!initialized) {
                initialRender(issues);
                return;
            }

            // Update data
            currentIssues = issues;
            tableState.issues = issues;

            // Save scroll position of the issues table container
            var tbody = document.getElementById('issues-tbody');
            var scrollContainer = tbody ? tbody.closest('.view') || tbody.parentElement : null;
            var savedScroll = scrollContainer ? scrollContainer.scrollTop : 0;

            // Re-render only the tbody (preserves search, filter chips, sort, thead)
            renderIssuesTable();
            updateFilterCounts();

            // Restore scroll position
            if (scrollContainer) scrollContainer.scrollTop = savedScroll;
        })
        .catch(function(err) {
            if (initialized) return; // Don't destroy UI on transient fetch errors after init
            var app = document.getElementById('app');
            app.textContent = '';
            var errDiv = document.createElement('div');
            errDiv.className = 'error-state';
            var msg = document.createElement('div');
            msg.textContent = 'Could not load issues';
            errDiv.appendChild(msg);
            var code = document.createElement('code');
            code.textContent = err.message;
            errDiv.appendChild(code);
            var hint = document.createElement('div');
            hint.style.color = 'var(--text-muted)';
            hint.style.fontSize = '0.75rem';
            hint.style.marginTop = '0.5rem';
            hint.textContent = 'Waiting for beads data endpoint at ' + dataUrl;
            errDiv.appendChild(hint);
            app.appendChild(errDiv);
        });
}

// Initial load
refreshData();

// Poll every 30 seconds
setInterval(refreshData, 30000);

// ─── PostMessage listener for immediate refresh ──────────────────────────────
window.addEventListener('message', function(event) {
    if (event.data && event.data.action === 'refresh-beads') {
        refreshData();
    }
});
</script>
